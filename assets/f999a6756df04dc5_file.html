<style id='acf-cta-style-inline-css' type='text/css'>
.hub-cta {
  position: relative;
  display: flex;
  width: 100%;
  overflow: hidden;
  border: 1px solid rgba(var(--border-100));
  border-radius: 1rem;
  min-height: 100px;
  margin: 2rem 0;
  background-color: rgba(var(--bg-100));
}

.hub-cta .tag {
  position: absolute;
  z-index: 10;
  left: 1rem;
  top: 1rem;
  padding: 0.125rem 0.375rem;
  background-color: rgba(var(--bg-100));
  border-radius: 9999px;
  justify-content: center;
  align-items: center;
  gap: 0.125rem;
  font-size: 0.75rem;
  line-height: 1rem;
}

.hub-cta .cta-thumb {
  max-width: 45%;
  width: 100%;
  position: relative;
  align-self: stretch;
  flex-shrink: 0;
  margin: 0 !important;
  position: relative;
}

.hub-cta .cta-thumb img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hub-cta .img-placeholder {
  display: flex;
  flex-shrink: 0;
  justify-content: center;
  align-items: center;
  align-self: stretch;
  width: 45%;
  background-color: rgba(var(--bg-400));
}

.hub-cta .img-placeholder svg path {
  fill: rgba(var(--text-100));
}

.hub-cta .content-wrapper {
  padding: 1.5rem 2rem;
  display: flex;
  flex-direction: column;
}

.hub-cta h2 {
  margin: 0 0 0.5rem !important;
  font-size: 1.25rem;
  font-weight: 600;
  line-height: 1.25;
  padding: 0 !important;
  border: none !important;
}

.hub-cta p {
  margin: 0 !important;
}

.hub-cta .cta-btn {
  position: relative;
  border-width: 2px;
  display: flex;
  padding: 0 1.5rem;
  padding-top: 0.625rem;
  padding-bottom: 0.625rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  max-width: max-content;
  gap: 0.5rem;
  font-weight: bold;
  vertical-align: middle;
  border-radius: 9999px;
  transition: all ease 0.3s;
  text-align: center;
  font-size: 0.875rem;
  line-height: 1.1875rem;
  outline-offset: -4px;
  color: rgba(var(--text-inverse)) !important;
  background-color: rgba(var(--primary));
  border-color: rgba(var(--primary));
  outline-color: rgba(var(--bg-200));
  text-decoration: none !important;
  margin: 2rem 0 0 !important;
}

.cta-btn:hover {
  background-color: rgba(var(--primary), 0.75);
  border-color: rgba(var(--primary), 0);
}

.cta-btn:focus {
  outline: 2px solid;
}

@media (max-width: 767px) {
  .hub-cta {
    flex-direction: column;
  }

  .hub-cta .cta-thumb,
  .hub-cta .img-placeholder {
    height: 200px;
    max-width: none;
    width: 100%;
  }

  .hub-cta .img-placeholder {
    height: 150px;
  }

  .hub-cta .content-wrapper {
    min-width: auto;
    align-items: center;
    text-align: center;
  }
}

<style id='acf-reader-poll-style-inline-css' type='text/css'>
/* Bloco principal */
.reader-poll.poll-slider {
  background-color: rgb(219, 236, 233);
  background-color: rgba(var(--bg-400), 1);
  padding: 1.5rem;
  border-radius: 1rem;
  border: 2px solid rgb(180, 200, 198);
  border-color: rgba(var(--primary), 0.25);
  margin-top: 2rem;
  margin-bottom: 2rem;
}

.reader-poll.poll-slider .container {
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  width: 100%;
}

/* Progresso */
.reader-poll.poll-slider .poll-progress {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
}

.reader-poll.poll-slider .poll-progress-bar {
  flex: 1;
  height: 6px;
  background-color: rgb(200, 211, 213);
  background-color: rgba(var(--border-100), 1);
  border-radius: 999px;
  overflow: hidden;
}

.reader-poll.poll-slider .poll-progress-fill {
  height: 100%;
  width: 0%;
  background-color: rgb(26, 147, 149);
  background-color: rgba(var(--primary), 1);
  border-radius: 999px;
  transition: width 0.4s ease;
}

.reader-poll.poll-slider .poll-progress-text {
  font-size: 0.8rem;
  font-weight: 600;
  color: rgb(26, 147, 149);
  color: rgba(var(--primary), 1);
  white-space: nowrap;
  min-width: 2.5rem;
  text-align: right;
}

/* Fieldset reset + layout coluna */
.reader-poll.poll-slider fieldset {
  border: none;
  padding: 0;
  margin: 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.reader-poll.poll-slider fieldset legend {
  font-size: 1.125rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
  padding: 0;
  float: left;
  width: 100%;
}

/* Respostas */
.reader-poll.poll-slider .poll-answer {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.6rem 0.75rem;
  border-radius: 0.5rem;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s ease, background-color 0.15s ease;
}

.reader-poll.poll-slider .poll-answer:hover {
  border-color: rgb(180, 200, 198);
  border-color: rgba(var(--primary), 0.4);
}

.reader-poll.poll-slider .poll-answer.is-selected {
  border-color: rgb(26, 147, 149);
  border-color: rgba(var(--primary), 1);
  background-color: rgba(26, 147, 149, 0.08);
  background-color: rgba(var(--primary), 0.08);
}

/* Oculta o radio nativo */
.reader-poll.poll-slider .poll-answer input[type="radio"] {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border-width: 0;
}

/* Slide de agradecimento */
.reader-poll.poll-slider .poll-finish-message {
  text-align: center;
  padding: 1rem 0;
  font-size: 1.25rem;
  font-weight: 600;
}

<style id='acf-recommended-content-style-inline-css' type='text/css'>
.recommended-article {
  width: 100%;
  border-radius: 1rem;
  overflow: hidden;
  border: 1px solid rgba(var(--border-100));
  margin: 2rem 0;
  background-color: rgba(var(--bg-100));
}

.recommended-article a {
  position: relative;
  width: 100%;
  min-height: 100px;
  display: flex;
  align-items: center;
  text-decoration: none !important;
}

.recommended-article figure {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 200px;
  overflow: hidden;
  margin: 0;
}

.recommended-article figure img {
  height: 100%;
  width: 100%;
  object-fit: cover;
}

.recommended-article .img-placeholder {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  align-self: stretch;
  width: 200px;
  background-color: rgba(var(--bg-400));
}

.recommended-article .img-placeholder svg path {
  fill: rgba(var(--text-100));
}

.recommended-article .wrapper {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.5rem 2rem;
  margin-left: 200px;
  width: 100%;
}

.recommended-article .wrapper div {
  display: flex;
  flex: 1;
  flex-direction: column;
  align-items: start;
  gap: 0.5rem;
}

.recommended-article div h3 {
  color: rgba(var(--text-200));
  margin: 0;
  font-weight: 700;
  font-size: 1rem;
}

.recommended-article .tag {
  border-radius: 9999px;
  padding: 0.125rem 0.375rem;
  font-size: 0.75rem;
  background-color: rgba(var(--bg-400));
  color: rgba(var(--text-200));
  font-size: 0.75rem;
}

.recommended-article i {
  display: block;
  font-size: 1rem;
  color: rgba(var(--primary));
}

@media (max-width: 550px) {
  .recommended-article {
    max-width: 300px;
    margin-inline: auto;
  }

  .recommended-article a {
    flex-direction: column;
  }

  .recommended-article figure,
  .recommended-article .img-placeholder {
    position: static;
    width: 100%;
    height: 100px;
  }

  .recommended-article .wrapper {
    padding: 1rem;
    margin-left: 0;
  }
}
